<!-- Firebase SDK（动态加载，仅当 CLOUD_ENABLED 为 true 时） -->
<script>
// 动态加载 Firebase SDK
function loadFirebaseSDK() {
  return new Promise((resolve, reject) => {
    if (typeof firebase !== 'undefined') { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
    script.onload = () => {
      // 加载 database 插件
      const script2 = document.createElement('script');
      script2.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js';
      script2.onload = () => resolve();
      script2.onerror = () => reject(new Error('Firebase database SDK 加载失败'));
      document.head.appendChild(script2);
    };
    script.onerror = () => reject(new Error('Firebase SDK 加载失败'));
    document.head.appendChild(script);
  });
}
</script>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

<script>
// ============ 退出登录 ============
function handleLogout() {
  sessionStorage.removeItem('isLoggedIn');
  sessionStorage.removeItem('adminAccount');
  sessionStorage.removeItem('adminLoginTime');
  window.location.replace('login.html');
}

// ============ 用户信息 UI ============
(function updateUserUI() {
  const account = sessionStorage.getItem('adminAccount') || 'admin';
  const avatar   = document.getElementById('userAvatar');
  const emailEl  = document.getElementById('userEmail');
  const userInfo = document.getElementById('userInfo');
  if (userInfo) userInfo.classList.remove('hidden');
  if (emailEl)  emailEl.textContent = account;
  if (avatar)   avatar.textContent  = account.charAt(0).toUpperCase();
})();

// ============ 云存档状态初始化 ============
(async function initCloudStatus() {
  const cloudSyncGroup = document.getElementById('cloudSyncGroup');
  const cloudStatusDot  = document.getElementById('cloudStatusDot');
  const cloudStatusText = document.getElementById('cloudStatusText');
  const cloudStatusBar  = document.getElementById('cloudStatusBar');

  if (typeof CLOUD_ENABLED !== 'undefined' && CLOUD_ENABLED && typeof FIREBASE_CONFIG !== 'undefined' && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    // 云存档已配置，加载 Firebase SDK
    try {
      await loadFirebaseSDK();
      const ok = initFirebase();
      if (ok) {
        cloudStatusDot.style.background = '#10b981';
        cloudStatusText.textContent = '云存档已连接';
        cloudSyncGroup.style.display = 'flex';
        cloudStatusBar.title = '云存档已连接，点击上传/下载数据';

        // 获取云端最后更新信息
        getCloudUpdateInfo().then(info => {
          if (info) {
            const cloudInfo = document.getElementById('cloudInfo');
            if (cloudInfo) {
              const t = new Date(info.lastUpdatedAt).toLocaleString('zh-CN');
              cloudInfo.textContent = `云端更新：${info.lastUpdatedBy} 于 ${t}`;
              cloudInfo.title = `云端数据最后由 ${info.lastUpdatedBy} 于 ${t} 更新`;
            }
          }
        });
      } else {
        cloudStatusDot.style.background = '#f59e0b';
        cloudStatusText.textContent = '云存档连接失败';
      }
    } catch (e) {
      cloudStatusDot.style.background = '#f59e0b';
      cloudStatusText.textContent = '云存档加载失败';
      console.error('[Cloud] SDK 加载失败', e);
    }
  } else {
    cloudStatusDot.style.background = '#888';
    cloudStatusText.textContent = '未配置云存档';
    cloudStatusBar.title = '点击查看云存档配置说明';
    cloudStatusBar.style.cursor = 'pointer';
    cloudStatusBar.onclick = showCloudConfigHelp;
  }
})();

// ============ 云存档配置帮助 ============
function showCloudConfigHelp() {
  const help = `
【云存档配置步骤】

1. 打开 https://console.firebase.google.com
2. 创建新项目（名称随意，例如：gaming-club）
3. 左侧菜单 → "实时数据库" → 点击"创建数据库"
   - 位置选：asia-southeast1（新加坡）
   - 启动模式选：测试模式（或手动设置规则为公开读写）
4. 数据库规则设置为：
   {
     "rules": {
       ".read": true,
       ".write": true
     }
   }
5. 项目设置（点击左侧齿轮图标）→ "常规" 标签
6. 向下滚动 → "您的应用" → 点击 "</>" （Web 应用）图标
7. 复制配置对象中的值，填写到 js/data.js 顶部：
   - apiKey
   - authDomain
   - databaseURL
   - projectId
   - storageBucket
   - messagingSenderId
   - appId
8. 把 CLOUD_ENABLED 改为 true
9. 保存后刷新页面即可使用云存档

【注意事项】
- 数据库规则为公开读写，仅适合内部管理系统
- 建议设置 Firebase 数据库容量上限（免费版 1GB）
- 多个管理员操作同一数据时会互相覆盖，建议先下载再修改再上传
  `.trim();
  alert(help);
}

// ============ 上传到云存档 ============
async function handleCloudUpload() {
  const btn = document.getElementById('btnCloudUpload');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;"></span>上传中...`;

  const ok = await DataStore.uploadToCloud();
  
  btn.disabled = false;
  btn.innerHTML = `
    <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M10 17V7M6 11l4-4 4 4M3 6v-1a2 2 0 012-2h10a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>上传到云</span>
  `;

  if (ok) {
    // 刷新云端更新信息
    getCloudUpdateInfo().then(info => {
      if (info) {
        const cloudInfo = document.getElementById('cloudInfo');
        if (cloudInfo) {
          const t = new Date(info.lastUpdatedAt).toLocaleString('zh-CN');
          cloudInfo.textContent = `云端更新：${info.lastUpdatedBy} 于 ${t}`;
          cloudInfo.title = `云端数据最后由 ${info.lastUpdatedBy} 于 ${t} 更新`;
        }
      }
    });
  }
}

// ============ 从云存档下载 ============
async function handleCloudDownload() {
  const btn = document.getElementById('btnCloudDownload');
  if (btn.disabled) return;
  if (!confirm('从云端下载数据将覆盖本地所有数据，确定要继续吗？')) return;

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;"></span>下载中...`;

  const ok = await DataStore.downloadFromCloud();
  
  btn.disabled = false;
  btn.innerHTML = `
    <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M10 3v10M6 9l4 4 4-4M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>下载云端</span>
  `;

  if (ok) {
    // 刷新页面数据
    if (typeof refreshData === 'function') refreshData();
    // 刷新云端更新信息
    getCloudUpdateInfo().then(info => {
      if (info) {
        const cloudInfo = document.getElementById('cloudInfo');
        if (cloudInfo) {
          const t = new Date(info.lastUpdatedAt).toLocaleString('zh-CN');
          cloudInfo.textContent = `云端更新：${info.lastUpdatedBy} 于 ${t}`;
          cloudInfo.title = `云端数据最后由 ${info.lastUpdatedBy} 于 ${t} 更新`;
        }
      }
    });
  }
}
