<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏陪玩俱乐部 · 管理员登录</title>
<style>
  /* ============ 基础重置 ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #06060f;
    --bg2:      #0e0d1a;
    --bg3:      #16142a;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.15);
    --accent:   #7c3aed;
    --accent2:  #9b5de5;
    --pink:     #db2777;
    --text:     #f1f0ff;
    --text2:    #a09ec0;
    --text3:    #6b6a8a;
    --success:  #10b981;
    --danger:   #ef4444;
    --warn:     #f59e0b;
    --input-bg: rgba(255,255,255,0.04);
    --glow:     rgba(124,58,237,0.18);
    --radius:   14px;
    --trans:    all 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ============ 背景动态效果 ============ */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .bg-orb-1 { width: 500px; height: 500px; top: -120px; left: -100px; background: radial-gradient(circle, #7c3aed, transparent 70%); animation-delay: 0s; }
  .bg-orb-2 { width: 400px; height: 400px; bottom: -100px; right: -80px; background: radial-gradient(circle, #db2777, transparent 70%); animation-delay: -3s; }
  .bg-orb-3 { width: 300px; height: 300px; top: 50%; left: 60%; background: radial-gradient(circle, #2563eb, transparent 70%); animation-delay: -5s; opacity: 0.1; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -30px) scale(1.05); }
    66% { transform: translate(-15px, 20px) scale(0.95); }
  }

  /* 网格纹理 */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  }

  /* ============ 主容器 ============ */
  .page {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  /* ============ 登录卡片 ============ */
  .card {
    width: 420px;
    max-width: 100%;
    background: rgba(14, 13, 26, 0.85);
    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 40px 36px;
    box-shadow:
      0 0 0 1px rgba(124,58,237,0.1),
      0 24px 80px rgba(0,0,0,0.6),
      0 0 120px rgba(124,58,237,0.08) inset;
    animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ============ Logo + 品牌区 ============ */
  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(219,39,119,0.25));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 18px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(124,58,237,0.2);
  }
  .brand-icon svg { width: 36px; height: 36px; }
  .brand h1 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e0d7ff 0%, #c4b5fd 40%, #f9a8d4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .brand p { font-size: 13px; color: var(--text3); }

  /* ============ 表单 ============ */
  .form { display: flex; flex-direction: column; gap: 18px; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label {
    font-size: 11px; font-weight: 700; color: var(--text3);
    letter-spacing: 0.8px; text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex; align-items: center;
  }
  .input-icon {
    position: absolute; left: 13px;
    color: var(--text3); pointer-events: none;
    display: flex; align-items: center;
    transition: var(--trans);
  }
  .input-wrap input {
    width: 100%; padding: 11px 14px 11px 38px;
    font-size: 14px; font-family: inherit;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    transition: var(--trans);
    outline: none;
    -webkit-appearance: none;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    background: rgba(124,58,237,0.07);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .input-wrap:focus-within .input-icon { color: var(--accent2); }
  .input-wrap input::placeholder { color: var(--text3); }

  /* 密码显示/隐藏切换 */
  .toggle-pw {
    position: absolute; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); padding: 4px;
    display: flex; align-items: center;
    transition: var(--trans);
  }
  .toggle-pw:hover { color: var(--text2); }
  input[type="password"].input-with-toggle,
  input[type="text"].input-with-toggle { padding-right: 40px; }

  /* ============ 错误信息 ============ */
  .err-msg {
    font-size: 12px; min-height: 0;
    display: none; align-items: center; gap: 6px;
    color: var(--danger);
    padding: 8px 12px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    animation: errIn 0.2s ease;
  }
  .err-msg.show { display: flex; }
  @keyframes errIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: translateY(0); } }

  /* 成功信息 */
  .ok-msg {
    font-size: 12px; min-height: 0;
    display: none; align-items: center; gap: 6px;
    color: var(--success);
    padding: 8px 12px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 8px;
    animation: errIn 0.2s ease;
  }
  .ok-msg.show { display: flex; }

  /* ============ 提交按钮 ============ */
  .btn-submit {
    padding: 13px 0; border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent) 0%, #9333ea 50%, var(--pink) 100%);
    background-size: 200% 100%;
    color: #fff; font-size: 15px; font-weight: 800;
    letter-spacing: 5px; font-family: inherit;
    cursor: pointer;
    transition: var(--trans);
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    margin-top: 4px;
  }
  .btn-submit:hover:not(:disabled) {
    background-position: 100% 0;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,58,237,0.45);
  }
  .btn-submit:active:not(:disabled) { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .btn-submit .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ 账号提示 ============ */
  .account-hint {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(124,58,237,0.06);
    border: 1px solid rgba(124,58,237,0.15);
    border-radius: 10px;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.8;
  }
  .account-hint strong { color: var(--accent2); font-weight: 700; }

  /* ============ 版权 ============ */
  .copyright {
    position: fixed; bottom: 20px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: var(--text3);
    z-index: 1; pointer-events: none;
  }

  /* ============ 响应式 ============ */
  @media (max-width: 480px) {
    .card { padding: 32px 24px 28px; border-radius: 20px; }
    .brand h1 { font-size: 19px; }
  }
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-layer">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>
<div class="bg-grid"></div>

<!-- 主页面 -->
<div class="page">
  <div class="card">

    <!-- 品牌 -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <path d="M20 3L8 12v9c0 9.4 5.16 18.1 12 22.4C27 39.1 32 30.4 32 21V12L20 3z" fill="url(#g1)" stroke="url(#g2)" stroke-width="1.5"/>
          <path d="M15 20l4 4 8-8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="g1" x1="8" y1="3" x2="32" y2="43"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#db2777"/></linearGradient>
            <linearGradient id="g2" x1="8" y1="3" x2="32" y2="43"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
          </defs>
        </svg>
      </div>
      <h1>游戏陪玩俱乐部</h1>
      <p>管理员登录 · v4.1</p>
    </div>

    <!-- ===== 登录表单 ===== -->
    <form class="form" id="formLogin" onsubmit="doLogin(event)">
      <div class="field">
        <label>管理员账号</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zM3 18a7 7 0 1114 0 7 7 0 01-14 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <input type="text" id="loginAccount" placeholder="请输入管理员账号" required autocomplete="username" autofocus>
        </div>
      </div>
      <div class="field">
        <label>密码</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 9V6.5a3.5 3.5 0 017 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="13.5" r="1.5" fill="currentColor"/></svg>
          </span>
          <input type="password" id="loginPwd" placeholder="请输入密码" required autocomplete="current-password" class="input-with-toggle">
          <button type="button" class="toggle-pw" onclick="togglePwd('loginPwd', this)" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>
      </div>
      <div class="err-msg" id="loginErr"></div>
      <button type="submit" class="btn-submit" id="loginBtn">登 录</button>
    </form>

    <!-- 账号提示 -->
    <div class="account-hint">
      🔒 仅限管理员登录，共 <strong>5</strong> 个授权账号<br>
      账号：yxdj001 / yxdj002 / yxdj003 / yxdj004 / yxdj005<br>
      密码：与账号相同
    </div>

  </div>
</div>

<div class="copyright">© 2026 游戏陪玩俱乐部 · 管理系统</div>

<script>
// ============================================================
//  授权管理员账号（共5个）
//  密码与账号相同
// ============================================================
const ADMIN_ACCOUNTS = {
  'yxdj001': 'yxdj001',
  'yxdj002': 'yxdj002',
  'yxdj003': 'yxdj003',
  'yxdj004': 'yxdj004',
  'yxdj005': 'yxdj005',
};

// ============ 密码显示/隐藏 ============
function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M8.5 8.7A2.5 2.5 0 0011.3 11.5M5.6 5.8C4 6.9 2.7 8.5 2 10c1.5 3.3 5 5.5 8 5.5a8.4 8.4 0 003.4-.7M8.6 4.6A8.4 8.4 0 0110 4.5c3 0 6.5 2.2 8 5.5a10.8 10.8 0 01-2.6 3.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  } else {
    input.type = 'password';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>`;
  }
}

// ============ 错误显示 ============
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.classList.add('show');
}
function clearErrors() {
  ['loginErr'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('show'); el.textContent = ''; }
  });
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `<span class="spinner"></span>登录中...`
    : '登 录';
}

// ============ 登录验证 ============
function doLogin(e) {
  e.preventDefault();
  clearErrors();

  const account = document.getElementById('loginAccount').value.trim();
  const pwd     = document.getElementById('loginPwd').value;

  if (!account || !pwd) {
    showErr('loginErr', '请输入账号和密码');
    return;
  }

  setLoading('loginBtn', true);

  // 模拟网络延迟（增强体验感）
  setTimeout(() => {
    if (ADMIN_ACCOUNTS[account] && ADMIN_ACCOUNTS[account] === pwd) {
      // 登录成功 → 写入 sessionStorage
      sessionStorage.setItem('isLoggedIn', 'true');
      sessionStorage.setItem('adminAccount', account);
      sessionStorage.setItem('adminLoginTime', new Date().toISOString());

      // 跳转到主页
      window.location.replace('index.html');
    } else {
      showErr('loginErr', '账号或密码错误！仅授权管理员可登录');
      setLoading('loginBtn', false);
    }
  }, 600);
}

// ============ 如果已登录，直接跳转主页 ============
if (sessionStorage.getItem('isLoggedIn') === 'true') {
  window.location.replace('index.html');
}
</script>

</body>
</html>
