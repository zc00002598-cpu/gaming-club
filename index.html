<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏陪玩俱乐部 · 管理系统</title>
<link rel="stylesheet" href="css/styles.css">
<!-- 登录守卫：Firebase Auth 检测，未登录立即跳转 -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// 与 data.js 使用相同的配置（保持一致）
const _cfg = window.__FIREBASE_CONFIG__;
if (_cfg && _cfg.apiKey && !_cfg.apiKey.startsWith('YOUR_')) {
  try {
    const _app = initializeApp(_cfg, 'guard');
    const _auth = getAuth(_app);
    // 页面初始隐藏，等验证后再显示
    document.documentElement.style.visibility = 'hidden';
    onAuthStateChanged(_auth, (user) => {
      if (!user || !user.emailVerified) {
        // 未登录 → 跳登录页
        window.location.replace('login.html');
      } else {
        // 已登录 → 显示页面，挂载用户信息
        document.documentElement.style.visibility = '';
        window.__CURRENT_USER__ = user;
      }
    });
  } catch(e) { document.documentElement.style.visibility = ''; }
} else {
  // 未配置 Firebase → 直接显示（提示模式）
  document.documentElement.style.visibility = '';
}
</script>
</head>
<body>

<!-- 顶部导航栏 -->

      </div>

        </button>
      </div>
      <!-- 云同步状态指示器 -->
      <div class="cloud-status" id="cloudStatusBar" onclick="DataStore.forceSync()" title="点击手动同步云端数据">
        <span class="cloud-status-dot" id="cloudStatusDot"></span>
        <span class="cloud-status-text" id="cloudStatusText">连接中...</span>
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14" style="opacity:0.5;flex-shrink:0"><path d="M14.5 13a4 4 0 10-3-6.65M5.5 13a4 4 0 110-8 4 4 0 010 8M5.5 13h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

      </button>

    </div>
  </div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

<script type="module">
import { getAuth, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

// ============ 退出登录 ============
window.handleLogout = async function() {
  try {
    const auth = getAuth();
    await signOut(auth);
    window.location.replace('login.html');
  } catch(e) {
    console.error('退出失败', e);
  }
};

// ============ 用户信息 UI ============
function updateUserUI(user) {
  const userInfo = document.getElementById('userInfo');
  const avatar   = document.getElementById('userAvatar');
  const emailEl  = document.getElementById('userEmail');
  if (!userInfo) return;
  if (user) {
    userInfo.classList.remove('hidden');
    if (emailEl) emailEl.textContent = user.email || '';
    if (avatar)  avatar.textContent  = (user.email || 'U').charAt(0).toUpperCase();
  } else {
    userInfo.classList.add('hidden');
  }
}

// 监听登录状态变化（用于实时更新顶栏用户信息）
try {
  const auth = getAuth();
  onAuthStateChanged(auth, (user) => {
    updateUserUI(user);
    if (!user) window.location.replace('login.html');
  });
} catch(e) {}

window.updateUserUI = updateUserUI;
window.showLoginModal = () => { window.location.replace('login.html'); };
</script>

</body>
